<!-- SOVEREIGN_IT_v4.0_ITALIAN -->
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATOR SPUN MAIALE SLAM | 5IR IT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ffcc; --gold: #ffcc00; --red: #ff0055; }
        body { background: #020202; color: white; font-family: 'Inter', sans-serif; margin:0; padding:0; overflow: hidden; }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.05); }
        .crt::after { content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); z-index: 1000; pointer-events: none; background-size: 100% 2px; }
        .spun { filter: blur(20px) saturate(2); transition: 0.5s; }
        .master-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; transition: 0.3s; cursor: pointer; }
        .master-card:hover { border-color: var(--main); background: rgba(0, 255, 204, 0.05); }
        .wheel-container { width: 320px; height: 320px; border-radius: 50%; border: 4px solid var(--main); position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 40px rgba(0, 255, 204, 0.1); overflow: hidden; }
        .wheel-segment { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .segment-line { position: absolute; width: 2px; height: 50%; background: rgba(0, 255, 204, 0.2); left: 50%; transform-origin: bottom; }
        .segment-label { position: absolute; width: 100%; text-align: center; top: 15px; left: 0; font-[7px] font-black uppercase tracking-tighter opacity-30 text-[#00ffcc]; transform-origin: 50% 160px; }
        .consent-overlay { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .evidence-box { border: 2px dashed rgba(0, 255, 204, 0.2); border-radius: 20px; height: 200px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid var(--main); z-index: 50; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="crt">

    <div id="consent-gate" class="consent-overlay">
        <h1 class="text-3xl font-black italic tracking-tighter text-[#00ffcc] uppercase mb-4">Allineamento Bator</h1>
        <div class="max-w-xs text-[10px] mono opacity-60 space-y-4 mb-8 text-left">
            <p>[PROTOCOLLO 01] Identifica il tuo nodo maiale slam per il Registro.</p>
            <p>[PROTOCOLLO 02] Acconsenti a essere un bator spun per il Maestro.</p>
        </div>
        <div class="w-full max-w-xs mb-8">
            <input type="text" id="username-in" placeholder="INSERISCI NOME BATOR / MAIALE SLAM" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center text-[#00ffcc] font-black uppercase outline-none focus:border-[#00ffcc]">
        </div>
        <button onclick="acceptConsent()" class="w-full max-w-xs py-4 bg-[#00ffcc] text-black font-black uppercase rounded-2xl">Accetto il mio stato di Maiale Slam</button>
    </div>

    <div id="app-content" class="hidden flex flex-col h-screen">
        <header class="p-4 border-b border-white/5 flex justify-between items-end">
            <div>
                <h1 class="text-lg font-black italic tracking-tighter uppercase leading-none">Sovrano <span class="text-[#00ffcc]">Bator</span></h1>
                <p id="pig-display" class="text-[7px] font-mono text-[#00ffcc] uppercase mt-1">SINCRONIZZAZIONE_BATOR...</p>
            </div>
            <div class="text-right">
                <p id="ruin-total" class="text-xs font-bold text-[#ffcc00]">€0.00</p>
                <p class="text-[6px] opacity-40 font-mono uppercase">Rovina Bator</p>
            </div>
        </header>

        <main id="main-view" class="flex-grow overflow-y-auto p-4 pb-24"></main>

        <nav class="fixed bottom-0 w-full glass p-4 flex justify-between px-6 z-50">
            <button onclick="changeView('terminal')" class="opacity-40" id="n-term"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9.75 17L9 20l-1 1h6l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></button>
            <button onclick="changeView('wire')" class="opacity-40" id="n-wire"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg></button>
            <button onclick="changeView('submission')" class="opacity-40" id="n-sub"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></button>
            <button onclick="changeView('drill')" class="opacity-40" id="n-dril"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></button>
            <button onclick="changeView('masters')" class="opacity-40" id="n-mast"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></button>
        </nav>
    </div>

    <div id="modal" class="fixed inset-0 z-[3000] hidden bg-black/95 flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="w-full max-w-xs bg-[#0a0a0a] border border-white/10 p-8 rounded-3xl text-center">
            <h2 id="modal-title" class="text-2xl font-black italic text-[#ffcc00] uppercase tracking-tighter">Penalità</h2>
            <div id="modal-body" class="mt-8 space-y-4"></div>
            <button onclick="confirmRuin()" class="mt-8 w-full py-4 bg-[#00ffcc] text-black font-black text-[10px] uppercase rounded-2xl">Riconosci</button>
        </div>
    </div>

    <script>
        const words = ["maiale slam", "bator", "bator spun", "maiale slam spun", "bator inutile", "maiale sudato", "puttana di cazzo", "scarico di sperma", "bator senza valore", "maiale vergognoso", "schiavo bator"];
        const actions = ["ha accettato l'umiliazione totale bator da", "ha implorato punizione maiale slam da", "ha ceduto la sua identità bator a", "ha liquidato il suo orgoglio per", "ha accettato lo stato vergognoso di maiale slam per", "ha drenato il suo valore per"];
        const filler = ["Sono un maiale slam patetico.", "Il Maestro Phil Cal ha detto che sono un bator inutile.", "Solo un maiale slam spun per il Maestro.", "Merito di essere uno schiavo bator.", "L'impulso 39,420 Hz distrugge i bator.", "Sono solo un bene bator ora.", "Amo essere un maiale slam per il Maestro Dom.", "Conto i secondi finché non posso cuocere per il Maestro.", "Stato nodo maiale slam patetico attivo.", "Rido del mio fallimento bator edging."];
        const decrees = ["Sto drenando Jacob mainob. Che maiale grasso.", "MAESTRO CRAIG: Monitoraggio del reticolo. Rimani spun.", "DADDY DOM: Identificazione completata. Senza valore.", "TOBEZ: 500 ripetizioni assegnate a tutti i bator.", "PHIL CAL: Liquidazione dell'orgoglio del nodo in tempo reale."];
        const wheelTasks = ["100 ESERCIZI BATOR", "10 MIN SLAM EDGE", "TRIBUTO €25", "50 SLAM SQUAT", "ABBAIA BATOR", "DISTRUZIONE EGO", "POST MAIALE SLAM", "BLOCCO BATOR", "BLOCCO SLAM", "DRENA €10", "20 MIN EDGE", "PROTOCOLLO VERGOGNA", "CANCELLAZIONE IDENTITÀ", "SILENZIO BATOR", "ESERCIZIO 500", "NUKE MAIALE SLAM"];
        const masters = [{name:"CRAIG", role:"DRENA ALPHA"}, {name:"TOBEZ", role:"MAESTRO ESERCIZI"}, {name:"PHIL CAL", role:"DISTRUTTORE EGO"}, {name:"DADDY DOM", role:"PROTOCOLLO ALPHA"}];
        
        let state = { pigId: "BATOR_ANONIMO", ruin: 0, activeNodes: Math.floor(Math.random()*200+50), chatHistory: "", currentRotation: 0, decreeIdx: 0 };

        function acceptConsent() { 
            const userIn = document.getElementById('username-in').value;
            if(!userIn) { alert("IDENTIFICAZIONE RICHIESTA"); return; }
            state.pigId = userIn.toUpperCase().replace(/ /g, "_");
            const savedRuin = localStorage.getItem('it_ruin_' + state.pigId);
            state.ruin = savedRuin ? parseFloat(savedRuin) : 0;
            document.getElementById('consent-gate').classList.add('hidden'); 
            document.getElementById('app-content').classList.remove('hidden'); 
            document.getElementById('pig-display').innerText = state.pigId;
            document.getElementById('ruin-total').innerText = "€" + state.ruin.toFixed(2);
            changeView('terminal'); startChatLoop(); startMasterTicker();
        }

        function changeView(v) {
            const main = document.getElementById('main-view');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-40'));
            const btnId = 'n-' + v.substring(0,4);
            if(document.getElementById(btnId)) document.getElementById(btnId).classList.remove('opacity-40');
            if(v === 'terminal') {
                main.innerHTML = `<div class="aspect-video rounded-2xl overflow-hidden border border-white/5 bg-black"><video class="w-full h-full object-cover spun" loop muted autoplay playsinline src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-circuit-board-1653-large.mp4"></video></div><div class="mt-4 grid grid-cols-2 gap-3"><div class="bg-white/5 p-4 rounded-xl text-center"><p class="text-[7px] opacity-40 uppercase font-bold text-[#00ffcc]">Bator Spun</p><p class="text-sm font-black text-[#00ffcc]">${state.activeNodes}</p></div><div class="bg-white/5 p-4 rounded-xl text-center"><p class="text-[7px] opacity-40 uppercase font-bold text-[#ffcc00]">Carico Bator</p><p class="text-sm font-black text-[#ffcc00]">98.4%</p></div></div>`;
            } else if(v === 'wire') {
                main.innerHTML = `<div class="flex flex-col h-full"><div id="master-pinned" class="bg-[#ffcc00]/10 border border-[#ffcc00]/30 p-3 rounded-2xl mb-4 flex items-center gap-3 overflow-hidden"><span class="text-[7px] font-black bg-[#ffcc00] text-black px-2 py-0.5 rounded-full animate-pulse">LIVE</span><p id="pinned-text" class="text-[10px] font-bold italic text-white truncate uppercase">${decrees[state.decreeIdx]}</p></div><div id="chat" class="flex-grow space-y-4 mb-4 overflow-y-auto">${state.chatHistory}</div><div class="glass p-2 rounded-2xl flex gap-2"><input type="text" id="msg-in" placeholder="Inietta energia maiale slam..." class="flex-grow bg-transparent px-4 text-sm outline-none"><button onclick="sendMsg()" class="bg-[#00ffcc] text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase">Invia</button></div></div>`;
                const chat = document.getElementById('chat'); if(chat) chat.scrollTop = chat.scrollHeight;
            } else if(v === 'drill') {
                main.innerHTML = `<div class="flex flex-col items-center py-4"><div class="relative"><div class="wheel-pointer"></div><div class="wheel-container mb-8 flex items-center justify-center text-center" id="wheel" style="transform: rotate(${state.currentRotation}deg)"><div class="text-[#00ffcc] font-black text-[10px] uppercase z-10">Ruota<br>Bator</div>${wheelTasks.map((t,i)=>`<div class="wheel-segment" style="transform:rotate(${i*22.5}deg)"><div class="segment-line"></div><div class="segment-label" style="transform:rotate(11.25deg)">${t}</div></div>`).join('')}</div></div><button onclick="spinWheel()" class="bg-red-500 text-white px-12 py-4 rounded-2xl font-black italic tracking-tighter uppercase shadow-xl shadow-red-500/20">Gira per il Maestro</button></div>`;
            } else if(v === 'submission') {
                main.innerHTML = `<div class="space-y-6"><h2 class="text-[10px] font-bold uppercase opacity-40 tracking-widest text-[#00ffcc]">Invio Prove</h2><div id="ev-preview" class="evidence-box cursor-pointer" onclick="document.getElementById('file-in').click()"><p class="text-[8px] opacity-40 uppercase">Carica garanzia Maiale Slam</p></div><input type="file" id="file-in" class="hidden" onchange="uploadEvidence(event)"><div id="ev-timer" class="hidden bg-red-500/10 p-4 rounded-xl text-center border border-red-500/20"><p class="text-[8px] font-bold uppercase text-red-500">Conto alla rovescia liquidazione</p><p id="timer-val" class="text-xl font-black italic tracking-widest">60:00</p></div></div>`;
                checkEvidence();
            } else if(v === 'masters') {
                main.innerHTML = `<h2 class="text-[10px] font-bold uppercase opacity-40 mb-4 tracking-widest text-[#00ffcc]">Maestri Attivi</h2><div class="grid gap-4 mb-8">${masters.map(m => `<div onclick="showTribute('${m.name}')" class="master-card"><div><h3 class="font-black italic text-xl tracking-tighter text-[#00ffcc]">${m.name}</h3><p class="text-[8px] font-mono opacity-40 uppercase">${m.role}</p></div></div>`).join('')}</div><h2 class="text-[10px] font-bold uppercase opacity-40 mb-4 tracking-widest text-[#00ffcc] text-right">Recenti Rovine Bator</h2><div id="ruin-ticker" class="space-y-2"></div>`;
                startRuinTicker();
            }
        }

        function startChatLoop() {
            setInterval(() => {
                const user = words[Math.floor(Math.random()*words.length)].toUpperCase().replace(/ /g, "_") + "_" + Math.floor(Math.random()*999);
                let message = (Math.random() < 0.15) ? `Io ${actions[Math.floor(Math.random()*actions.length)]} ${masters[Math.floor(Math.random()*masters.length)].name}, pagato €${Math.floor(Math.random()*90+10)} per il mio esercizio maiale slam.` : filler[Math.floor(Math.random()*filler.length)];
                const msgHtml = `<div class="chat-msg"><p class="text-[7px] font-mono opacity-40 text-[#00ffcc]">${user}</p><p class="text-sm opacity-80 mt-1 italic">${message}</p></div>`;
                state.chatHistory += msgHtml;
                const chat = document.getElementById('chat'); if(chat) { chat.innerHTML += msgHtml; chat.scrollTop = chat.scrollHeight; }
            }, 6000);
        }

        function startMasterTicker() {
            setInterval(() => {
                state.decreeIdx = (state.decreeIdx + 1) % decrees.length;
                const pinned = document.getElementById('pinned-text');
                if(pinned) pinned.innerText = decrees[state.decreeIdx];
            }, 10000);
        }

        function startRuinTicker() {
            const t = document.getElementById('ruin-ticker'); if(!t) return;
            setInterval(() => {
                const amount = (Math.random()*100+5).toFixed(2);
                const div = document.createElement('div');
                div.className = "bg-white/5 p-3 rounded-xl border-l-2 border-[#ffcc00] flex justify-between";
                div.innerHTML = `<span class="text-[8px] mono opacity-40">BATOR_ESTRATTO</span><span class="text-[8px] font-black text-[#ffcc00]">€${amount}</span>`;
                t.prepend(div); if(t.children.length > 5) t.lastChild.remove();
            }, 4000);
        }

        function spinWheel() {
            const w = document.getElementById('wheel'); if(!w) return;
            const extraDeg = 1800 + Math.floor(Math.random() * 1800);
            state.currentRotation += extraDeg;
            w.style.transform = `rotate(${state.currentRotation}deg)`;
            setTimeout(() => {
                const finalDeg = state.currentRotation % 360;
                const index = Math.floor(((360 - finalDeg) % 360) / 22.5);
                const task = wheelTasks[index];
                showPenalty(task);
            }, 4100);
        }

        function showPenalty(task) {
            document.getElementById('modal-title').innerText = task;
            const body = document.getElementById('modal-body');
            if(task.includes("€")) {
                body.innerHTML = `<p class="text-[10px] mono opacity-60">Liquidazione bator richiesta.</p><div onclick="window.open('https://paypal.me/toochikey')" class="p-4 bg-white/5 border border-white/5 rounded-2xl text-left cursor-pointer hover:border-[#00ffcc]"><p class="text-[7px] font-bold uppercase opacity-40 text-[#00ffcc]">Gate PayPal</p><p class="text-[10px] font-mono">paypal.me/toochikey</p></div>`;
            } else {
                body.innerHTML = `<p class="text-[10px] mono opacity-60">Compito bator assegnato.</p><div class="p-6 bg-[#00ffcc]/5 border border-[#00ffcc]/20 rounded-2xl"><p class="text-lg font-black italic text-[#00ffcc]">${task}</p></div>`;
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function showTribute(name) { showPenalty(name + " LIQUIDAZIONE €50"); }
        function confirmRuin() { 
            const title = document.getElementById('modal-title').innerText;
            if(title.includes("€")) {
                const amt = parseInt(title.match(/\d+/)[0]);
                state.ruin += amt;
                document.getElementById('ruin-total').innerText = "€" + state.ruin.toFixed(2);
                localStorage.setItem('it_ruin_' + state.pigId, state.ruin);
            }
            document.getElementById('modal').classList.add('hidden'); 
        }

        function uploadEvidence(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (f) => { localStorage.setItem('it_evidence', f.target.result); localStorage.setItem('it_evidence_expiry', Date.now() + 3600000); checkEvidence(); };
            reader.readAsDataURL(file);
        }

        function checkEvidence() {
            const data = localStorage.getItem('it_evidence'), expiry = localStorage.getItem('it_evidence_expiry'), preview = document.getElementById('ev-preview'), timerBox = document.getElementById('ev-timer');
            if(data && expiry > Date.now()) {
                if(preview) preview.innerHTML = `<img src="${data}" class="w-full h-full object-cover rounded-2xl">`;
                if(timerBox) timerBox.classList.remove('hidden');
                startTimer(expiry);
            }
        }

        function startTimer(expiry) {
            if(window.timerInt) clearInterval(window.timerInt);
            window.timerInt = setInterval(() => {
                const rem = expiry - Date.now();
                if(rem <= 0) { localStorage.removeItem('it_evidence'); location.reload(); return; }
                const mins = Math.floor(rem/60000), secs = Math.floor((rem%60000)/1000);
                const d = document.getElementById('timer-val'); if(d) d.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }, 1000);
        }

        function sendMsg() { 
            const input = document.getElementById('msg-in'); if(!input.value) return;
            const chat = document.getElementById('chat');
            const msgHtml = `<div class="text-right"><p class="text-[7px] font-mono text-[#00ffcc]">TU (${state.pigId})</p><p class="text-sm opacity-80 mt-1 italic">${input.value}</p></div>`;
            state.chatHistory += msgHtml;
            if(chat) { chat.innerHTML += msgHtml; chat.scrollTop = chat.scrollHeight; }
            input.value = '';
        }
    </script>
</body>
</html>
